function roundedRect(ctx,x,y,w,h,r){

  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);

  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}

function currentState(){const key=$('sheet').value; return {sheet:key,multiPos:selectedExtraPositionKeys(),mode:plannerMode(),smartTarget:($('smartTarget')?$('smartTarget').value:'160'),smartCap:($('smartCap')?$('smartCap').value:'400'),smartMaxSteps:($('smartMaxSteps')?$('smartMaxSteps').value:'12'),smartAttrs:getSmartSelectedAttrs(),targets:(ensureTargetState(key)||[]).slice(),tier:$('tier').value,trainAge:$('trainAge').value,curAge:$('curAge').value,baseMax:$('baseMax').value,skills:getSkillValues(),plan:(ensurePlanState(key)||[]).slice()};}
function applyState(st){if(!st) return; suppressPlannerSave=true; const s=$('sheet'); if(st.sheet&&DATA[st.sheet]) s.value=st.sheet; const extras=(st.multiPos||[]).filter(k=>DATA[k]&&k!==s.value); if($('extraPos1')) $('extraPos1').value=extras[0]||''; if($('extraPos2')) $('extraPos2').value=extras[1]||''; if($('plannerMode')) $('plannerMode').value=(st.mode==='advanced'?'advanced':'basic'); if($('smartTarget')) $('smartTarget').value=st.smartTarget||160; if($('smartCap')) $('smartCap').value=st.smartCap||400; if($('smartMaxSteps')) $('smartMaxSteps').value=st.smartMaxSteps||12; updatePlannerModeUI(); $('tier').value=st.tier||'1'; $('trainAge').value=st.trainAge||18; $('curAge').value=st.curAge||18; $('baseMax').value=st.baseMax||180; if(st.plan) PLAN_STATE[s.value]=st.plan.slice(); if(st.targets) PLAN_TARGET_STATE[s.value]=st.targets.map(clampTarget); syncMultiPosToSheet(); renderSkills(); restoreSkillValues(st.skills||[]); renderSmartAttrPicker(st.smartAttrs||[]); calc(); suppressPlannerSave=false; updateActiveBadge();}
function defaultStateForSheet(sheet='GK Training Plan'){const d=DATA[sheet]; return {sheet,multiPos:[],mode:'basic',smartTarget:'160',smartCap:'400',smartMaxSteps:'12',targets:(d.plan||[]).map(()=>180),tier:'1',trainAge:'18',curAge:'18',baseMax:'180',skills:(d.initials||Array(15).fill(1)).map(x=>String(Math.round(x))),plan:(d.plan||[]).map(x=>x.drill||'')};}
function getTeam(){try{return JSON.parse(localStorage.getItem(TEAM_STORAGE_KEY)||'null')||null;}catch(e){return null;}}
function setTeam(team){localStorage.setItem(TEAM_STORAGE_KEY,JSON.stringify(team));}
function ensureTeam(){let team=getTeam(); if(!team||!Array.isArray(team.players)||!team.players.length){const id='p_'+Date.now(); team={activeId:id,players:[{id,name:'GK Main',state:defaultStateForSheet('GK Training Plan'),created:Date.now(),updated:Date.now()}]}; setTeam(team); activePlayerId=id;} else if(!activePlayerId){activePlayerId=team.activeId||team.players[0].id;} return team;}
function saveActiveState(){if(suppressPlannerSave||!activePlayerId) return; const team=ensureTeam(); const p=team.players.find(x=>x.id===activePlayerId); if(!p) return; p.state=currentState(); p.updated=Date.now(); team.activeId=activePlayerId; setTeam(team); renderPlayerList();}
let saveTimer=null;
function scheduleAutoSave(){if(suppressPlannerSave) return; clearTimeout(saveTimer); saveTimer=setTimeout(saveActiveState,250);}
function selectTrainRow(row){
  if(!row) return;
  document.querySelectorAll('tr.selectedTrainRow').forEach(tr=>tr.classList.remove('selectedTrainRow'));
  row.classList.add('selectedTrainRow');
}

function renderPlayerList(){const team=ensureTeam(); const box=$('playerList'); if(!box) return; box.innerHTML=''; let total=0; team.players.forEach(p=>{const pos=playerPos(p)||'MC'; const ovr=avgOvrFromState(p.state); total+=ovr; const isActive=p.id===activePlayerId; const div=document.createElement('div'); div.className='playerCard '+posClass(pos)+(isActive?' active':''); div.dataset.id=p.id; div.onclick=()=>selectPlayer(p.id); div.innerHTML=`<div class="playerTop"><div class="playerName">${isActive?'▶ ':''}${p.name}</div><div class="playerOvr">${ovr.toFixed(1)}</div></div><div class="playerMeta">${pos} · ${({1:'World Class',2:'Excellent',3:'Good',4:'Normal'}[p.state.tier]||'World Class')}</div>`; box.appendChild(div);}); $('sumPlayers').textContent=team.players.length; $('sumAvg').textContent=(team.players.length?total/team.players.length:0).toFixed(1); const ap=team.players.find(x=>x.id===activePlayerId); $('sumCurrent').textContent=ap?playerPos(ap):'-'; updateActiveBadge(); const activeEl=box.querySelector('.playerCard.active'); if(activeEl) setTimeout(()=>activeEl.scrollIntoView({block:'nearest',inline:'nearest'}),0);}
function updateActiveBadge(){const team=getTeam(); if(!team) return; const p=team.players.find(x=>x.id===activePlayerId); const el=$('activePlayerBadge'); if(el&&p){el.textContent=p.name+' · '+(playerPos(p)||sheetDisplay(p.state.sheet))+' · Auto Save';}}
function selectPlayer(id){saveActiveState(); const team=ensureTeam(); const p=team.players.find(x=>x.id===id); if(!p) return; activePlayerId=id; team.activeId=id; setTeam(team); applyState(p.state); updatePlannerModeUI(); renderSmartAttrPicker(p.state.smartAttrs||[]); renderPlayerList(); if(window.innerWidth<=900) toggleSidebar(false);}
function sheetForPos(pos){pos=String(pos||'').toUpperCase(); if(pos==='GK')return 'GK Training Plan'; if(['DC','DL','DR'].includes(pos))return 'DC'; if(pos==='DMC')return 'DMC'; if(['MC','ML','MR'].includes(pos))return 'MC'; if(pos==='AMC')return 'AMC'; if(['AML','AMR'].includes(pos))return 'AMR,AML'; if(pos==='ST')return 'ST'; return $('sheet').value||'MC';}
function newPlayer(){saveActiveState(); let name=prompt('新建球员名称，例如：ST Messi / DC #1 / GK Main','New Player'); if(!name) return; const pos=normalizePosFromText(name)||sheetDisplay($('sheet').value); const sheet=sheetForPos(pos); const id='p_'+Date.now(); const team=ensureTeam(); team.players.push({id,name:name.trim(),state:defaultStateForSheet(sheet),created:Date.now(),updated:Date.now()}); team.activeId=id; setTeam(team); renderPlayerList(); selectPlayer(id);}
function duplicatePlayer(){saveActiveState(); const team=ensureTeam(); const p=team.players.find(x=>x.id===activePlayerId); if(!p) return; const id='p_'+Date.now(); const copy=JSON.parse(JSON.stringify(p)); copy.id=id; copy.name=p.name+' Copy'; copy.created=Date.now(); copy.updated=Date.now(); team.players.push(copy); team.activeId=id; setTeam(team); selectPlayer(id);}
function renamePlayer(){const team=ensureTeam(); const p=team.players.find(x=>x.id===activePlayerId); if(!p) return; const name=prompt('修改球员名称',p.name); if(!name) return; p.name=name.trim(); p.updated=Date.now(); setTeam(team); renderPlayerList(); updateActiveBadge();}
function deletePlayer(){let team=ensureTeam(); if(team.players.length<=1){alert('至少保留一个球员方案。');return;} const oldId=activePlayerId; const p=team.players.find(x=>x.id===oldId); if(!p) return; if(!confirm('删除 '+p.name+' ?')) return; team.players=team.players.filter(x=>x.id!==oldId); const next=team.players[0]; team.activeId=next.id; setTeam(team); activePlayerId=next.id; applyState(next.state); renderPlayerList(); updateActiveBadge();}
function exportTeamJson(){saveActiveState(); const blob=new Blob([JSON.stringify(ensureTeam(),null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='top-eleven-team-planner.json'; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(a.href),1000);}
function importTeamJson(ev){const file=ev.target.files&&ev.target.files[0]; if(!file)return; const reader=new FileReader(); reader.onload=()=>{try{const team=JSON.parse(reader.result); if(!team.players||!Array.isArray(team.players)) throw new Error('bad'); setTeam(team); activePlayerId=team.activeId||team.players[0].id; selectPlayer(activePlayerId); alert('导入成功');}catch(e){alert('导入失败：JSON 格式不正确');}}; reader.readAsText(file); ev.target.value='';}

function onPlannerModeChange(){ updatePlannerModeUI(); calc(); }
function updatePlannerModeUI(){const card=$('proPlannerCard'); if(card) card.classList.add('hidden');}
function attrGroupClass(i){ if(i<5) return 'def'; if(i<10) return 'att'; return 'phy'; }
function renderSmartAttrPicker(selected){const key=$('sheet').value,d=DATA[key]; const box=$('smartAttrBox'); if(!box||!d) return; const prev = Array.isArray(selected)?selected:getSmartSelectedAttrs(); const selectedSet=new Set((prev||[]).map(Number)); const whiteEff=effectiveWhiteFor(key); box.innerHTML=d.skillLabels.map((lab,i)=>`<label class="attrPick ${attrGroupClass(i)} ${whiteEff[i]?'whiteText':''}"><input type="checkbox" class="smartAttr" value="${i}" ${selectedSet.has(i)?'checked':''}>${lab}</label>`).join('');}
function selectWhiteAttrs(){const key=$('sheet').value,d=DATA[key]; if(!d) return; const whiteEff=effectiveWhiteFor(key); renderSmartAttrPicker(whiteEff.map((v,i)=>v?i:null).filter(v=>v!==null)); scheduleAutoSave();}
function clearSmartAttrs(){document.querySelectorAll('.smartAttr').forEach(ch=>{ch.checked=false;}); scheduleAutoSave();}
function getSmartSelectedAttrs(){return Array.from(document.querySelectorAll('.smartAttr:checked')).map(x=>Number(x.value));}
function simulateOneDrill(skills,map,whiteEff,target,cap){const B=map.reduce((a,b)=>a+b,0); if(!B) return {gain:0,newSkills:skills.slice(),Q:0,P:0,beforeOvr:avg(skills),afterOvr:avg(skills)}; const C=map.reduce((a,b,i)=>a+b*(whiteEff[i]?1:0),0); const D=B-C; const Fstart=map.reduce((a,b,i)=>a+b*skills[i],0)/B; const gain=Fstart>target?0:(target-Fstart)*B; const denom=C+D*0.5; let ns=skills.slice(); if(gain>0&&denom>0){for(let i=0;i<15;i++){if(map[i]) ns[i]=Math.min(cap, ns[i]+(gain/denom)*(whiteEff[i]?1:0.5));}} const Gend=map.reduce((a,b,i)=>a+b*ns[i],0)/B; return {gain,newSkills:ns,Fstart,Gend,beforeOvr:avg(skills),afterOvr:avg(ns),B,C,D};}
function avg(arr){return arr.reduce((a,b)=>a+b,0)/arr.length;}
function generateSmartPlan(){const key=$('sheet').value,d=DATA[key]; if(!d) return; const attrs=getSmartSelectedAttrs(); if(!attrs.length){alert('请先选择至少一个主要训练属性');return;} const target=clampTarget($('smartTarget')?.value||160); const maxSteps=Math.max(1,Math.min(30,Number($('smartMaxSteps')?.value)||12)); const cap=Math.max(1,Math.min(400,Number($('smartCap')?.value)||400)); const whiteEff=effectiveWhiteFor(key); const tier=num($('tier').value), trainAge=num($('trainAge').value), curAge=num($('curAge').value); const rates=getRates(tier,trainAge); let skills=Array.from({length:15},(_,i)=>num((document.querySelector(`.skill[data-idx="${i}"]`)||{}).value)); if(trainAge>=curAge) skills=skills.map(x=>x+(curAge-trainAge)*20); const drills=Object.keys(d.drillMap).filter(x=>d.drillMap[x]&&d.drillMap[x].some(v=>v)); let rows=[],totalP=0; for(let step=0; step<maxSteps; step++){let best=null; for(const drill of drills){const map=d.drillMap[drill]; if(!attrs.some(i=>map[i])) continue; const sim=simulateOneDrill(skills,map,whiteEff,target,cap); const improve=attrs.reduce((a,i)=>a+Math.max(0,sim.newSkills[i]-skills[i]),0); if(improve<=1e-7) continue; const seg=segmentPoints(sim.B,sim.Fstart,sim.Gend); const cond=seg.reduce((a,p,j)=>a+(rates[j]?p/rates[j]:0),0); const cost=d.costs[drill]||0; const Q=cost?roundup(cond/cost):0; const P=Q*cost/15; const score=improve/Math.max(P,0.0001); if(!best||score>best.score) best={drill,map,sim,improve,Q,P,score}; } if(!best) break; const before=skills.slice(); skills=best.sim.newSkills.slice(); totalP+=best.P; rows.push({step:step+1,drill:best.drill,map:best.map,before,after:skills.slice(),Q:best.Q,P:best.P,beforeOvr:avg(before),afterOvr:avg(skills)}); const selAvg=attrs.reduce((a,i)=>a+skills[i],0)/attrs.length; if(selAvg>=target-1e-7) break; } renderSmartResult(rows,attrs,totalP,target,whiteEff,d.skillLabels);}
function renderSmartResult(rows,attrs,totalP,target,whiteEff,labels){const box=$('smartResult'); if(!box) return; if(!rows.length){box.innerHTML='<div class="note">没有找到还能有效提升所选属性的训练项目。可以降低 Stop At，或更换目标属性。</div>';return;} let h='<div class="tablewrap"><table class="excelOut"><tr><th>#</th><th>推荐训练项目</th><th>组数</th><th>绿包</th><th>训练前OVR</th><th>训练后OVR</th>'+labels.map((x,i)=>`<th class="vhead ${whiteEff[i]?'whiteHead':'grayHead'}">${x}</th>`).join('')+'</tr>'; rows.forEach(r=>{h+=`<tr class="trainRow" data-slot="${r.step-1}" onclick="selectTrainRow(this)" ondblclick="toggleSkillDetail(this)"><td>${r.step}</td><td class="selectCell"><b class="${drillColorClass(r.drill)}">${r.drill}</b></td><td>${r.Q}</td><td>${Number(r.P).toFixed(1)}</td><td class="beforeOvr">${r.beforeOvr.toFixed(1)}%</td><td class="afterOvr">${r.afterOvr.toFixed(1)}%</td>`+r.after.map((x,i)=>`<td class="${whiteEff[i]?'whiteCell':'grayCell'} ${r.map[i]?'trainedCell':''}">${Math.round(x)}</td>`).join('')+'</tr>';}); h+=`</table></div><div class="proNote">推荐项目数：${rows.length}；预计消耗绿包：${totalP.toFixed(1)}；目标 Stop At：${target}。双击训练行可查看 3×5 训练前 → 训练后。</div>`; box.innerHTML=h; LAST_CALC_ROWS=rows.map((r,i)=>({slot:i,drill:r.drill,map:r.map,beforeSkills:r.before,skills:r.after,beforeOvr:r.beforeOvr,afterOvr:r.afterOvr,Q:r.Q,P:r.P})); LAST_CALC_LABELS=labels; LAST_CALC_WHITE=whiteEff; attachTrainRowDetails();}

function init(){const s=$('sheet'); const extras=[$('extraPos1'),$('extraPos2')].filter(Boolean); const keys=Object.keys(DATA).filter(k=>k!='rates'); let blank=document.createElement('option'); blank.value=''; blank.textContent='-'; s.appendChild(blank.cloneNode(true)); keys.forEach(k=>{let o=document.createElement('option'); o.value=k; o.textContent=sheetDisplay(k); s.appendChild(o);}); extras.forEach(el=>{el.appendChild(blank.cloneNode(true)); keys.forEach(k=>{let m=document.createElement('option'); m.value=k; m.textContent=sheetDisplay(k); el.appendChild(m);});}); s.value='GK Training Plan'; syncMultiPosToSheet(); s.onchange=()=>{syncMultiPosToSheet(); renderSkillsKeepValues(); calc(); scheduleAutoSave();}; extras.forEach(el=>el.onchange=()=>{syncMultiPosToSheet(); renderSkillsKeepValues(); calc(); scheduleAutoSave();}); const team=ensureTeam(); activePlayerId=team.activeId||team.players[0].id; const p=team.players.find(x=>x.id===activePlayerId)||team.players[0]; applyState(p.state); updatePlannerModeUI(); renderSmartAttrPicker(p.state.smartAttrs||[]); renderPlayerList(); document.addEventListener('input',e=>{if(e.target.closest('.wrap')||e.target.id==='plannerMode') scheduleAutoSave();}); document.addEventListener('change',e=>{if(e.target.closest('.wrap')||e.target.id==='plannerMode') scheduleAutoSave();}); window.addEventListener('beforeunload',saveActiveState);}
try{
  init();
}catch(e){
  console.error('INIT_ERROR', e);
  try{
    if(typeof renderSkills==='function') renderSkills();
    if(typeof calc==='function') calc();
    if(typeof renderPlayerList==='function') renderPlayerList();
  }catch(e2){console.error('FALLBACK_ERROR', e2);}
}
setTimeout(()=>{
  try{
    if(typeof calc==='function' && document.querySelectorAll('#result tr').length===0) calc();
    if(typeof renderPlayerList==='function') renderPlayerList();
  }catch(e){console.error('POST_INIT_ERROR', e);}
}, 300);
</script></body></html>
